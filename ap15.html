<<!--Create a webpage titled Top 3s trekking destinations in Nepal. Add a heading using <h1> tag. Insert
images of 3 popular destinations in the webpage. Use caption tag to label these images. Make use of alt
for each images of equal width 300px.-->
<!DOCTYPE html>
<html>
<head>
    <title>Top 3 Trekking Destinations in Nepal</title>
</head>
<body>

<h1>Top 3 Trekking Destinations in Nepal</h1>

<figure>
    <img src="https://excitingnepal.com/wp-content/uploads/2021/12/12-Days-Everest-base-Camp-trek.jpeg" alt="Everest Base Camp Trek" width="300">
    <figcaption>Everest Base Camp Trek</figcaption>
</figure>

<figure>
    <img src="https://www.intrepidtravel.com/adventures/wp-content/uploads/2018/05/Hiker-800.jpg" alt="Annapurna Circuit Trek" width="300">
    <figcaption>Annapurna Circuit Trek</figcaption>
</figure>

<figure>
    <img src="https://api.hikingbees.com/media/langtang-valley_vY0FLiG.jpg" alt="Langtang Valley Trek" width="300">
    <figcaption>Langtang Valley Trek</figcaption>
</figure>

</body>
</html>
