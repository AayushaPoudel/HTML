<!DOCTYPE html>
<html>
<head>
    <title>Fibonacci Series</title>
</head>
<body>

<!-- 
Question 3:
Generate Fibonacci series using for loop.
-->

<h2>Fibonacci Series</h2>
<div id="fib"></div>

<script>
    let n = 10;
    let a = 0, b = 1;
    let result = `${a}, ${b}`;

    for(let i = 2; i < n; i++){
        let next = a + b;
        result += `, ${next}`;
        a = b;
        b = next;
    }

    document.getElementById("fib").innerHTML = result;
</script>

</body>
</html>
