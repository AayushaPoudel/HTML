<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Project Details Table</title>

    <!-- Internal CSS -->

    <style>

        body {

            font-family: Arial, sans-serif;

            background-color: #f2f2f2;

        }

        .table {

            width: 80%;

            margin: 40px auto;

            border: 2px solid #333;

        }

        .row {

            display: flex;

        }

        .header {

            background-color: #4a7a8c;

            color: white;

            font-weight: bold;

        }

        .cell {

            flex: 1;

            border: 1px solid #333;

            padding: 10px;

            text-align: center;

            background-color: #ffffff;

        }

        .row:nth-child(even) .cell {

            background-color: #e6f2f2;

        }

    </style>

</head>

<body>

    <div class="table">

        <!-- Header Row -->

        <div class="row header">

            <div class="cell">S.N</div>

            <div class="cell">Project Name</div>

            <div class="cell">Student Name</div>

            <div class="cell">Roll No</div>

            <div class="cell">Remarks</div>

        </div>

        <!-- Row 1 -->

        <div class="row">

            <div class="cell">1</div>

            <div class="cell">E-Commerce Website</div>

            <div class="cell">Aayusha Poudel</div>

            <div class="cell">101</div>

            <div class="cell">Excellent</div>

        </div>

        <!-- Row 2 -->

        <div class="row">

            <div class="cell">2</div>

            <div class="cell">Library System</div>

            <div class="cell">Aayusha Tandukar</div>

            <div class="cell">102</div>

            <div class="cell">Very Good</div>

        </div>

        <!-- Row 3 -->

        <div class="row">

            <div class="cell">3</div>

            <div class="cell">Online Voting</div>

            <div class="cell">Dibyanshu Basnet</div>

            <div class="cell">103</div>

            <div class="cell">Good</div>

        </div>

        <!-- Row 4 -->

        <div class="row">

            <div class="cell">4</div>

            <div class="cell">Student Portal</div>

            <div class="cell">Rebika Rai</div>

            <div class="cell">104</div>

            <div class="cell">Excellent</div>

        </div>

    </div>

</body>

</html>
